<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Engineer Roadmap 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#131319;--bg3:#1b1b24;--bg4:#242430;
--border:#2a2a38;--border2:#3a3a4a;
--text:#e8e8ed;--text2:#9898aa;--text3:#666680;
--accent:#f5a623;--accent2:#d4900e;--aglow:rgba(245,166,35,.1);
--critical:#ff4757;--high:#ff8c42;--medium:#ffd166;--low:#06d6a0;
--r:10px;--rl:14px;
--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
--hh:60px;--th:50px;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;line-height:1.55}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
a{color:var(--accent);text-decoration:none}a:hover{color:#ffc56e}

.hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:rgba(10,10,15,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 20px;gap:14px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.li{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#e07a08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#000}
.lt{font-weight:600;font-size:16px;white-space:nowrap}.lt span{color:var(--text3);font-weight:400;font-size:13px;margin-left:3px}
.hs{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0}
.pill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);background:var(--bg2);padding:5px 11px;border-radius:20px;border:1px solid var(--border);white-space:nowrap}
.pill .n{font-family:var(--mono);font-weight:500;color:var(--accent)}
.rw{position:relative;width:34px;height:34px;flex-shrink:0;cursor:pointer}.rw:hover{transform:scale(1.08)}
.rsvg{transform:rotate(-90deg)}.rbg{fill:none;stroke:var(--border);stroke-width:3}.rfill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s}
.rtxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;font-family:var(--mono);color:var(--accent)}

.tw{position:fixed;top:var(--hh);left:0;right:0;height:var(--th);background:rgba(10,10,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:99;overflow-x:auto;scrollbar-width:none}
.tw::-webkit-scrollbar{display:none}
.tabs{display:flex;align-items:center;height:100%;padding:0 16px;gap:3px;min-width:max-content}
.tab{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid transparent;display:flex;align-items:center;gap:7px;user-select:none}
.tab:hover{color:var(--text2);background:var(--bg2)}
.tab.active{color:var(--text);background:var(--bg3);border-color:var(--border)}
.tbadge{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3);line-height:1.3}
.tab.active .tbadge{background:var(--aglow);color:var(--accent)}
.tab.done .tbadge{background:rgba(6,214,160,.12);color:var(--low)}
.tdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.main{margin-top:calc(var(--hh) + var(--th));padding:20px 16px 120px;max-width:880px;margin-left:auto;margin-right:auto}
.phdr{margin-bottom:20px}
.ptitle{font-size:22px;font-weight:600;letter-spacing:-.4px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.psub{color:var(--text3);font-size:13px;margin-bottom:14px}
.pbarw{display:flex;align-items:center;gap:10px}
.btr{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .4s;background:var(--accent)}.bf.ok{background:var(--low)}
.bpct{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:36px;text-align:right}

.fbar{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:16px;font-size:11.5px;font-weight:500;color:var(--text3);background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s;font-family:var(--font);user-select:none}
.fb:hover{border-color:var(--border2);color:var(--text2)}.fb.on{color:var(--text);border-color:var(--accent);background:var(--aglow)}
.si{flex:1;min-width:140px;padding:6px 12px;border-radius:16px;font-size:13px;color:var(--text);background:var(--bg2);border:1px solid var(--border);font-family:var(--font);outline:none;transition:border-color .15s}
.si::placeholder{color:var(--text3)}.si:focus{border-color:var(--accent)}

/* ── CARD: normal state ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;transition:all .25s;position:relative}
.card:hover{border-color:var(--border2);background:var(--bg3)}
.card.chk{opacity:.5}.card.chk:hover{opacity:.7}
.card.chk .ititle{text-decoration:line-through;text-decoration-color:var(--text3)}
/* ── CARD: expanded (focus mode) ── */
.card.expanded{border-color:var(--accent);background:var(--bg3);margin-bottom:16px}
.card.dimmed{display:none}
.card .detail-panel{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.card.expanded .detail-panel{display:block}
.card.expanded .desc-short{display:none}

.dbtn{position:absolute;top:12px;right:14px;font-size:11.5px;color:var(--text3);cursor:pointer;padding:3px 10px;border-radius:6px;background:var(--bg4);user-select:none;transition:all .15s;border:1px solid transparent;z-index:2;font-family:var(--font);font-weight:500}
.dbtn:hover{color:var(--accent);border-color:var(--accent);background:var(--aglow)}
.card.expanded .dbtn{color:var(--accent);border-color:var(--accent);background:var(--aglow)}

.itop{display:flex;align-items:flex-start;gap:12px}
.cbw{flex-shrink:0;margin-top:2px}
.cb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border:2px solid var(--border2);border-radius:6px;cursor:pointer;transition:all .15s;display:block;background:transparent}
.cb:hover{border-color:var(--accent)}
.cb:checked{background:var(--accent);border-color:var(--accent)}
.cb:checked::after{content:'✓';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;height:100%}
.ic{flex:1;min-width:0}
.itr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ititle{font-size:15px;font-weight:500;line-height:1.35}
.pbadge{font-size:9.5px;font-weight:600;font-family:var(--mono);padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.pbadge.critical{background:rgba(255,71,87,.12);color:var(--critical)}
.pbadge.high{background:rgba(255,140,66,.12);color:var(--high)}
.pbadge.medium{background:rgba(255,209,102,.12);color:var(--medium)}
.pbadge.low{background:rgba(6,214,160,.12);color:var(--low)}
.desc-short{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.res-row{display:flex;flex-wrap:wrap;gap:5px}
.rchip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:500;background:var(--bg4);color:var(--text2);border:1px solid transparent;transition:all .15s;text-decoration:none}
.rchip:hover{border-color:var(--accent);color:var(--accent);background:var(--aglow)}

/* ── DETAIL PANEL (expanded) ── */
.dp-label{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:8px}
.dp-sec{margin-bottom:14px}
.dp-desc{font-size:13.5px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.dp-tags{display:flex;flex-wrap:wrap;gap:5px}
.dp-tag{font-size:11.5px;font-family:var(--mono);padding:3px 10px;border-radius:5px;color:var(--text2);background:var(--bg4);border:1px solid var(--border)}
.dp-res{display:flex;flex-wrap:wrap;gap:6px}

/* ── ANALYTICS ── */
.afab{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e07a08);color:#000;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(245,166,35,.25);z-index:100;transition:transform .15s}
.afab:hover{transform:scale(1.08)}
.apanel{position:fixed;top:0;right:0;bottom:0;width:min(400px,100vw);background:var(--bg);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .3s;overflow-y:auto;padding:24px;overscroll-behavior:contain}
.apanel.open{transform:translateX(0)}
.aov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;pointer-events:none;transition:opacity .25s}
.aov.open{opacity:1;pointer-events:auto}
.acl{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.acl:hover{background:var(--bg3);color:var(--text)}
.at{font-size:19px;font-weight:600;margin-bottom:20px}
.asec{margin-bottom:22px}.ast{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px}
.abig{text-align:center;padding:20px;background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border)}
.abn{font-size:46px;font-weight:700;font-family:var(--mono);color:var(--accent);line-height:1}.abl{font-size:12px;color:var(--text3);margin-top:4px}
.apr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.apnm{font-size:12.5px;color:var(--text2);min-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.apbw{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}.apbf{height:100%;border-radius:4px;transition:width .4s}
.app{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:32px;text-align:right}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.agi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.agn{font-size:24px;font-weight:600;font-family:var(--mono);line-height:1.1}.agl{font-size:10.5px;color:var(--text3);margin-top:3px}
.pbr{display:flex;flex-direction:column;gap:6px}.pb{display:flex;align-items:center;gap:7px;font-size:12.5px}
.pbd{width:8px;height:8px;border-radius:50%;flex-shrink:0}.pbl{color:var(--text2);flex:1}.pbv{font-family:var(--mono);font-size:11px;color:var(--text3)}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}.empty .em{font-size:36px;margin-bottom:8px}
.resetw{text-align:center;margin-top:32px;padding-top:18px;border-top:1px solid var(--border)}
.resetb{padding:8px 20px;border-radius:8px;font-size:12px;font-weight:500;color:var(--critical);background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.15);cursor:pointer;font-family:var(--font)}
.resetb:hover{background:rgba(255,71,87,.12)}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .25s ease both}
@keyframes flash{0%{opacity:0;transform:scale(.9)}40%{opacity:1}100%{opacity:0;transform:scale(1.05)}}
.pcf{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none}
.pcf .msg{font-size:24px;font-weight:700;color:var(--low);animation:flash 1.6s ease forwards}

@media(max-width:480px){
  :root{--hh:56px;--th:46px}
  html{font-size:18px}
  .hdr{padding:0 16px;gap:8px}
  .lt span{display:none}
  .pill.hm{display:none}
  .main{padding:18px 18px 110px}
  .ptitle{font-size:20px}
  .tab{padding:7px 12px;font-size:12px}
  .card{padding:14px 16px}
  .apanel{width:100vw;padding:20px}
  .apnm{min-width:80px;font-size:11.5px}
  .si{font-size:14px;padding:8px 14px}
  .fb{padding:6px 13px;font-size:12px}
}
@media(min-width:481px) and (max-width:768px){.main{padding:20px 24px 120px}.pill.hm{display:none}}
@media(min-width:1200px){.main{max-width:940px}}
@media(min-width:1600px){.main{max-width:1020px}.card{padding:18px 22px}}
</style>
</head>
<body>

<header class="hdr">
<div class="logo"><div class="li">AI</div><div class="lt">Roadmap <span>2026</span></div></div>
<div class="hs">
<div class="pill hm"><span class="n" id="sd">0</span>/<span id="st">0</span></div>
<div class="pill hm"><span class="n" id="sc">0</span> critical ✓</div>
<div class="rw" id="rclick" title="Analytics"><svg class="rsvg" viewBox="0 0 36 36"><circle class="rbg" cx="18" cy="18" r="15"/><circle class="rfill" id="rf" cx="18" cy="18" r="15" stroke-dasharray="94.25" stroke-dashoffset="94.25"/></svg><div class="rtxt" id="rt">0%</div></div>
</div>
</header>
<nav class="tw"><div class="tabs" id="tabs"></div></nav>

<main class="main">
<div id="phdr"></div>
<div class="fbar" id="fbar"></div>
<div id="il"></div>
<div class="resetw" id="rw"><button class="resetb" id="rb">Reset all progress</button></div>
</main>

<button class="afab" id="afab">📊</button>
<div class="aov" id="aov"></div>
<aside class="apanel" id="apn"><button class="acl" id="acl">✕</button><div class="at">Progress analytics</div><div id="ac"></div></aside>

<script>
const P=[
{id:'foundations',t:'Phase 1: Foundations',s:'Verify your existing knowledge — check off completed items',c:'#06d6a0',items:[
{id:'f1',t:'Karpathy: Neural Networks — Zero to Hero',d:'The gold-standard deep learning playlist. Builds neural nets from scratch in Python: backprop engine (micrograd), character-level language models (makemore with bigrams → MLPs → WaveNet → Transformers), GPT from scratch (nanoGPT), and tokenization (minbpe). You\'ll understand every line of a transformer implementation by the end.',r:[{n:'▶️ Full Playlist (10 videos)',u:'https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ',t:'video'},{n:'GitHub: nn-zero-to-hero',u:'https://github.com/karpathy/nn-zero-to-hero',t:'code'},{n:'▶️ Let\'s Build GPT',u:'https://www.youtube.com/watch?v=kCc8FmEb1nY',t:'video'}],tags:['backprop','micrograd','makemore','GPT','tokenizer','transformer','attention','PyTorch','nanoGPT'],p:'critical'},
{id:'f2',t:'3Blue1Brown: Neural Networks',d:'Beautiful visual intuitions for how neural networks learn. Covers neurons/layers, gradient descent, backpropagation mechanics, and a new chapter on transformers and attention. Watch alongside Karpathy for geometric intuition.',r:[{n:'▶️ Neural Net Playlist',u:'https://www.youtube.com/playlist?list=PLZHQObOWTQDNU6R1_67000Dx_ZCJB-3pi',t:'video'},{n:'▶️ Attention in Transformers',u:'https://www.youtube.com/watch?v=eMlx5fFNoYc',t:'video'}],tags:['visual intuition','gradient descent','backprop','attention','transformers'],p:'critical'},
{id:'f3',t:'HODL: MIT Sloan ML — Prof. Rama Ramakrishnan',d:'Applied ML from a business/decision-making lens. Covers when ML works, framing ML problems, evaluation thinking, practical deployment considerations. Great complement to pure technical content.',r:[{n:'▶️ HODL YouTube Course',u:'https://www.youtube.com/playlist?list=PLIBbMOLVTCMbp4HFN0AIbJMgHC0puSxFD',t:'video'},{n:'Rama\'s MIT Sloan Page',u:'https://mitsloan.mit.edu/faculty/directory/rama-ramakrishnan',t:'docs'}],tags:['applied ML','business framing','ML strategy','evaluation','MIT Sloan'],p:'high'},
{id:'f4',t:'Stanford CS229: Machine Learning',d:'Andrew Ng\'s legendary ML course. Linear/logistic regression, SVMs, neural nets, unsupervised learning, EM algorithm, and the mathematical rigor behind it all.',r:[{n:'▶️ CS229 Full Lectures',u:'https://www.youtube.com/playlist?list=PLoROMvodv4rMiGQp3WXShtMGgzqpfVfbU',t:'video'},{n:'Course Notes',u:'https://cs229.stanford.edu/main_notes.pdf',t:'docs'}],tags:['ML fundamentals','regression','SVMs','math foundations','probability'],p:'medium'},
]},
{id:'swe_ai',t:'Phase 2: AI for Software Engineers',s:'Everything a production SWE needs to build AI-powered applications — no PhD required',c:'#22d3ee',items:[
{id:'sw1',t:'LLM API fundamentals',d:'Working with OpenAI, Anthropic, and open-source model APIs. Chat completions, system/user/assistant messages, temperature/top-p, streaming, token counting, cost estimation, rate limiting, retry patterns.',r:[{n:'▶️ FreeCodeCamp: LLM APIs Crash Course',u:'https://www.youtube.com/watch?v=xIxrkMij0Xk',t:'video'},{n:'Anthropic API Docs',u:'https://docs.anthropic.com/en/docs/initial-setup',t:'docs'},{n:'OpenAI Quickstart',u:'https://platform.openai.com/docs/quickstart',t:'docs'},{n:'▶️ Fireship: OpenAI API in 100s',u:'https://www.youtube.com/watch?v=_j7JEDWuqLE',t:'video'}],tags:['API','chat completions','streaming','tokens','rate limiting','cost','messages'],p:'critical'},
{id:'sw2',t:'Prompt engineering (practical)',d:'Zero-shot, few-shot, chain-of-thought, system prompts, output formatting, prompt templates. The actual craft of getting LLMs to reliably do what you want in production code.',r:[{n:'▶️ DeepLearning.AI: Prompt Engineering',u:'https://www.deeplearning.ai/short-courses/chatgpt-prompt-engineering-for-developers/',t:'video'},{n:'Anthropic Prompt Guide',u:'https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview',t:'docs'},{n:'▶️ Karpathy: State of GPT',u:'https://www.youtube.com/watch?v=bZQun8Y4L2A',t:'video'},{n:'OpenAI Prompt Best Practices',u:'https://platform.openai.com/docs/guides/prompt-engineering',t:'docs'}],tags:['zero-shot','few-shot','CoT','system prompts','templates','prompt design'],p:'critical'},
{id:'sw3',t:'Embeddings & vector databases',d:'What embeddings are, generating them (OpenAI, Cohere, open-source), similarity/distance metrics, storing and querying in Qdrant/Pinecone/Chroma/Weaviate.',r:[{n:'▶️ Fireship: Vector DBs Explained',u:'https://www.youtube.com/watch?v=klTvEwg3oJ4',t:'video'},{n:'Qdrant Quickstart',u:'https://qdrant.tech/documentation/quickstart/',t:'docs'},{n:'▶️ James Briggs: Vector Search',u:'https://www.youtube.com/watch?v=dN0lsF2cvm4',t:'video'},{n:'Pinecone Learn: Embeddings',u:'https://www.pinecone.io/learn/vector-embeddings/',t:'blog'}],tags:['embeddings','vector DB','Qdrant','Pinecone','semantic search','cosine similarity'],p:'critical'},

const SK='ai-roadmap-v4';let S={ck:{},ap:'foundations',fl:'all',q:''};
const load=()=>{try{const d=JSON.parse(localStorage.getItem(SK));if(d){S.ck=d.ck||{};S.ap=d.ap||'foundations'}}catch(e){}};
const save=()=>{try{localStorage.setItem(SK,JSON.stringify({ck:S.ck,ap:S.ap}))}catch(e){}};
const $=id=>document.getElementById(id);
const allI=()=>P.flatMap(p=>p.items);
const ps=p=>{const d=p.items.filter(i=>S.ck[i.id]).length;return{d,t:p.items.length,p:p.items.length?Math.round(d/p.items.length*100):0}};
const os=()=>{const a=allI(),d=a.filter(i=>S.ck[i.id]).length,cr=a.filter(i=>i.p==='critical'),cd=cr.filter(i=>S.ck[i.id]).length;return{d,t:a.length,p:a.length?Math.round(d/a.length*100):0,cd,ct:cr.length}};
const ri=t=>({docs:'📄',blog:'📝',video:'▶️',book:'📕',paper:'🔬',course:'🎓',code:'💻'}[t]||'🔗');
let expandedId=null;

function renderTabs(){
$('tabs').innerHTML=P.map(p=>{const s=ps(p);return`<div class="tab${p.id===S.ap?' active':''}${s.p===100?' done':''}" data-p="${p.id}"><span class="tdot" style="background:${p.c}"></span>${p.t.replace(/Phase \d+: /,'').replace('Skippable: ','⏭ ')}<span class="tbadge">${s.d}/${s.t}</span></div>`}).join('');
$('tabs').querySelectorAll('.tab').forEach(t=>t.onclick=()=>{S.ap=t.dataset.p;S.fl='all';S.q='';expandedId=null;save();render();t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})});
}

function renderPhdr(){
const ph=P.find(p=>p.id===S.ap);if(!ph)return;const s=ps(ph);
$('phdr').innerHTML=`<div class="ptitle"><span style="color:${ph.c}">●</span> ${ph.t}</div><div class="psub">${ph.s}</div><div class="pbarw"><div class="btr"><div class="bf${s.p===100?' ok':''}" style="width:${s.p}%"></div></div><div class="bpct">${s.p}%</div></div>`;
}

function renderFbar(){
$('fbar').innerHTML=`${['all','critical','high','medium','low'].map(f=>`<button class="fb${S.fl===f?' on':''}" data-f="${f}">${f==='all'?'All':f[0].toUpperCase()+f.slice(1)}</button>`).join('')}<input class="si" id="si" type="text" placeholder="Search topics…" value="${S.q}">`;
$('fbar').querySelectorAll('.fb').forEach(b=>b.onclick=()=>{S.fl=b.dataset.f;renderFbar();renderItems()});
let deb;$('si').oninput=e=>{clearTimeout(deb);deb=setTimeout(()=>{S.q=e.target.value;renderItems()},300)};
}

function renderItems(){
const ph=P.find(p=>p.id===S.ap);if(!ph)return;
let items=ph.items;
if(S.fl!=='all')items=items.filter(i=>i.p===S.fl);
if(S.q){const q=S.q.toLowerCase();items=items.filter(i=>i.t.toLowerCase().includes(q)||i.d.toLowerCase().includes(q)||i.tags.some(t=>t.toLowerCase().includes(q)))}
$('il').innerHTML=items.length?items.map(i=>{
const exp=expandedId===i.id;
const dim=expandedId&&expandedId!==i.id;
return`<div class="card${S.ck[i.id]?' chk':''}${exp?' expanded':''}${dim?' dimmed':''}" data-id="${i.id}">
<button class="dbtn" data-exp="${i.id}">${exp?'✕ close':'details ↻'}</button>
<div class="itop"><div class="cbw"><input class="cb" type="checkbox"${S.ck[i.id]?' checked':''} data-id="${i.id}"></div>
<div class="ic"><div class="itr"><span class="ititle">${i.t}</span><span class="pbadge ${i.p}">${i.p}</span></div>
<div class="desc-short">${i.d}</div>
<div class="res-row">${i.r.map(r=>`<a class="rchip" href="${r.u}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="ri">${ri(r.t)}</span>${r.n}</a>`).join('')}</div>
</div></div>
<div class="detail-panel">
<div class="dp-sec"><div class="dp-desc">${i.d}</div></div>
<div class="dp-sec"><div class="dp-label">Topics covered</div><div class="dp-tags">${i.tags.map(t=>`<span class="dp-tag">${t}</span>`).join('')}</div></div>
<div class="dp-sec"><div class="dp-label">Resources</div><div class="dp-res">${i.r.map(r=>`<a class="rchip" href="${r.u}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="ri">${ri(r.t)}</span>${r.n}</a>`).join('')}</div></div>
</div>
</div>`}).join(''):'<div class="empty"><div class="em">🔍</div><p>No items match filters</p></div>';
$('rw').style.display=expandedId?'none':'';
// Events
$('il').querySelectorAll('.cb').forEach(cb=>{cb.onclick=e=>e.stopPropagation();cb.onchange=e=>{
const id=e.target.dataset.id;if(e.target.checked)S.ck[id]=1;else delete S.ck[id];save();renderTabs();renderPhdr();renderHeader();renderItems();
const s=ps(ph);if(s.p===100&&e.target.checked)showFlash(ph.t);
}});
$('il').querySelectorAll('[data-exp]').forEach(b=>b.onclick=e=>{
e.stopPropagation();const id=b.dataset.exp;
expandedId=expandedId===id?null:id;
renderItems();
if(expandedId){const el=document.querySelector(`.card[data-id="${expandedId}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})}
});
}

function renderHeader(){
const s=os();$('sd').textContent=s.d;$('st').textContent=s.t;$('sc').textContent=s.cd+'/'+s.ct;
$('rf').style.strokeDashoffset=94.25-(94.25*s.p/100);$('rt').textContent=s.p+'%';
}

function renderA(){
const o=os(),a=allI(),bp={critical:0,high:0,medium:0,low:0},bt={critical:0,high:0,medium:0,low:0};
a.forEach(i=>{bt[i.p]++;if(S.ck[i.id])bp[i.p]++});
$('ac').innerHTML=`<div class="asec"><div class="abig"><div class="abn">${o.p}%</div><div class="abl">Overall · ${o.d} of ${o.t}</div></div></div>
<div class="asec"><div class="ast">Priority breakdown</div><div class="pbr">${[['critical','--critical'],['high','--high'],['medium','--medium'],['low','--low']].map(([k,v])=>`<div class="pb"><span class="pbd" style="background:var(${v})"></span><span class="pbl">${k}</span><span class="pbv">${bp[k]}/${bt[k]}</span></div>`).join('')}</div></div>
<div class="asec"><div class="ast">Phase progress</div>${P.map(p=>{const s=ps(p);return`<div class="apr"><span class="apnm">${p.t.replace(/Phase \d+: /,'').replace('Skippable: ','')}</span><div class="apbw"><div class="apbf" style="width:${s.p}%;background:${p.c}"></div></div><span class="app">${s.p}%</span></div>`}).join('')}</div>
<div class="asec"><div class="ast">Quick stats</div><div class="agrid">
<div class="agi"><div class="agn" style="color:var(--critical)">${bp.critical}/${bt.critical}</div><div class="agl">Critical done</div></div>
<div class="agi"><div class="agn" style="color:var(--low)">${P.filter(p=>ps(p).p===100).length}/${P.length}</div><div class="agl">Phases done</div></div>
<div class="agi"><div class="agn" style="color:var(--accent)">${a.filter(i=>S.ck[i.id]).reduce((s,i)=>s+i.r.length,0)}</div><div class="agl">Resources used</div></div>
<div class="agi"><div class="agn">${o.t-o.d}</div><div class="agl">Remaining</div></div></div></div>`;
}

function showFlash(t){const e=document.createElement('div');e.className='pcf';e.innerHTML=`<div class="msg">✅ ${t} complete!</div>`;document.body.appendChild(e);setTimeout(()=>e.remove(),1800)}
function render(){renderTabs();renderPhdr();renderFbar();renderItems();renderHeader();renderA()}

const openA=()=>{$('apn').classList.add('open');$('aov').classList.add('open');renderA()};
const closeA=()=>{$('apn').classList.remove('open');$('aov').classList.remove('open')};
$('afab').onclick=openA;$('aov').onclick=closeA;$('acl').onclick=closeA;$('rclick').onclick=openA;
document.onkeydown=e=>{if(e.key==='Escape'){if(expandedId){expandedId=null;renderItems()}else closeA()}};
$('rb').onclick=()=>{if(confirm('Reset all progress? Cannot undo.')){S.ck={};save();render()}};

load();render();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
