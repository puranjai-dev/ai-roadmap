<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Engineer Roadmap 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#131319;--bg3:#1b1b24;--bg4:#242430;--border:#2a2a38;--border2:#3a3a4a;--text:#e8e8ed;--text2:#9898aa;--text3:#666680;--accent:#f5a623;--accent2:#d4900e;--aglow:rgba(245,166,35,.1);--critical:#ff4757;--high:#ff8c42;--medium:#ffd166;--low:#06d6a0;--inprog:#a78bfa;--r:10px;--rl:14px;--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--hh:60px;--th:50px}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;line-height:1.55}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
a{color:var(--accent);text-decoration:none}a:hover{color:#ffc56e}
/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:rgba(10,10,15,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 20px;gap:10px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.li{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#e07a08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#000}
.lt{font-weight:600;font-size:16px;white-space:nowrap}.lt span{color:var(--text3);font-weight:400;font-size:13px;margin-left:3px}
.hs{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.hbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.hbtn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.pill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);background:var(--bg2);padding:5px 11px;border-radius:20px;border:1px solid var(--border);white-space:nowrap}
.pill .n{font-family:var(--mono);font-weight:500;color:var(--accent)}
.rw{position:relative;width:34px;height:34px;flex-shrink:0;cursor:pointer}.rw:hover{transform:scale(1.08)}
.rsvg{transform:rotate(-90deg)}.rbg{fill:none;stroke:var(--border);stroke-width:3}.rfill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s}
.rtxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;font-family:var(--mono);color:var(--accent)}
/* TABS */
.tw{position:fixed;top:var(--hh);left:0;right:0;height:var(--th);background:rgba(10,10,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:99;overflow-x:auto;scrollbar-width:none}.tw::-webkit-scrollbar{display:none}
.tabs{display:flex;align-items:center;height:100%;padding:0 16px;gap:3px;min-width:max-content}
.tab{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid transparent;display:flex;align-items:center;gap:7px;user-select:none}
.tab:hover{color:var(--text2);background:var(--bg2)}.tab.active{color:var(--text);background:var(--bg3);border-color:var(--border)}
.tbadge{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3);line-height:1.3}
.tab.active .tbadge{background:var(--aglow);color:var(--accent)}.tab.done .tbadge{background:rgba(6,214,160,.12);color:var(--low)}
.tdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
/* MAIN */
.main{margin-top:calc(var(--hh) + var(--th));padding:20px 16px 120px;max-width:880px;margin-left:auto;margin-right:auto}
.phdr{margin-bottom:20px}.ptitle{font-size:22px;font-weight:600;letter-spacing:-.4px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.psub{color:var(--text3);font-size:13px;margin-bottom:14px}
.pbarw{display:flex;align-items:center;gap:10px}.btr{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .4s;background:var(--accent)}.bf.ok{background:var(--low)}.bpct{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:36px;text-align:right}
/* FILTERS */
.fbar{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:16px;font-size:11.5px;font-weight:500;color:var(--text3);background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s;font-family:var(--font);user-select:none}
.fb:hover{border-color:var(--border2);color:var(--text2)}.fb.on{color:var(--text);border-color:var(--accent);background:var(--aglow)}
.si{flex:1;min-width:140px;padding:6px 12px;border-radius:16px;font-size:13px;color:var(--text);background:var(--bg2);border:1px solid var(--border);font-family:var(--font);outline:none}.si:focus{border-color:var(--accent)}.si::placeholder{color:var(--text3)}
.scan-btn{padding:5px 14px;border-radius:16px;font-size:11.5px;font-weight:500;color:var(--accent);background:var(--aglow);border:1px solid var(--accent);cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.scan-btn:hover{background:rgba(245,166,35,.2)}.scan-btn:disabled{opacity:.5;cursor:wait}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;transition:border-color .15s,background .15s,opacity .15s;position:relative}
.card:hover{border-color:var(--border2);background:var(--bg3)}
.card.st-done{opacity:.5}.card.st-done:hover{opacity:.7}.card.st-done .ititle{text-decoration:line-through;text-decoration-color:var(--text3)}
.card.st-ip{border-left:3px solid var(--inprog)}
.card.expanded{border-color:var(--accent);background:var(--bg3)}.card.dimmed{display:none}
.card .dp{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}.card.expanded .dp{display:block}
.card.expanded .ds{display:none}
/* REC CARD */
.card.rec{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.04)}
.rec-bar{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.rec-add{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:500;color:#000;background:var(--accent);border:none;cursor:pointer;font-family:var(--font)}
.rec-add:hover{background:var(--accent2)}
.rec-del{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:500;color:var(--text3);background:var(--bg4);border:1px solid var(--border);cursor:pointer;font-family:var(--font)}
.rec-del:hover{color:var(--critical);border-color:var(--critical)}
.rec-worth{font-size:11px;font-family:var(--mono);margin-left:auto}
.rec-worth.yes{color:var(--low)}.rec-worth.no{color:var(--text3)}
.rec-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.rec-header span{font-size:13px;font-weight:500;color:var(--accent)}
.rec-clear{margin-left:auto;font-size:11px;color:var(--critical);background:none;border:1px solid rgba(255,71,87,.2);padding:3px 10px;border-radius:6px;cursor:pointer;font-family:var(--font)}
.rec-clear:hover{background:rgba(255,71,87,.08)}
/* DBTN */
.dbtn{font-size:11px;color:var(--text3);cursor:pointer;padding:3px 9px;border-radius:6px;background:var(--bg4);user-select:none;transition:all .15s;border:1px solid transparent;font-family:var(--font);font-weight:500;margin-left:auto;flex-shrink:0;white-space:nowrap}
.dbtn:hover{color:var(--accent);border-color:var(--accent);background:var(--aglow)}
.card.expanded .dbtn{color:var(--accent);border-color:var(--accent);background:var(--aglow)}
/* CARD INTERNALS */
.itop{display:flex;align-items:flex-start;gap:12px}
.stbtn{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .15s;flex-shrink:0;margin-top:1px;background:transparent;color:transparent;font-family:var(--font)}
.stbtn:hover{border-color:var(--accent)}
.stbtn.ip{border-color:var(--inprog);background:rgba(167,139,250,.15);color:var(--inprog)}
.stbtn.done{border-color:var(--low);background:var(--low);color:#000}
.ic{flex:1;min-width:0}
.itr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ititle{font-size:15px;font-weight:500;line-height:1.35}
.pbadge{font-size:9.5px;font-weight:600;font-family:var(--mono);padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.pbadge.critical{background:rgba(255,71,87,.12);color:var(--critical)}.pbadge.high{background:rgba(255,140,66,.12);color:var(--high)}
.pbadge.medium{background:rgba(255,209,102,.12);color:var(--medium)}.pbadge.low{background:rgba(6,214,160,.12);color:var(--low)}
.ds{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dep-hint{font-size:11px;color:var(--text3);margin-bottom:6px}.dep-hint a{color:var(--inprog);font-weight:500}
.rr{display:flex;flex-wrap:wrap;gap:5px}
.rchip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:500;background:var(--bg4);color:var(--text2);border:1px solid transparent;transition:all .15s;text-decoration:none}
.rchip:hover{border-color:var(--accent);color:var(--accent);background:var(--aglow)}
/* DETAIL PANEL */
.dpl{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:8px}
.dps{margin-bottom:14px}
.dpd{font-size:13.5px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.dptags{display:flex;flex-wrap:wrap;gap:5px}
.dpt{font-size:11.5px;font-family:var(--mono);padding:3px 10px;border-radius:5px;color:var(--text2);background:var(--bg4);border:1px solid var(--border)}
.notes-area{width:100%;min-height:60px;padding:10px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;resize:vertical;outline:none;line-height:1.5;margin-top:4px}
.notes-area:focus{border-color:var(--accent)}
.notes-area::placeholder{color:var(--text3)}
/* ANALYTICS */
.afab{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e07a08);color:#000;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(245,166,35,.25);z-index:100;transition:transform .15s}.afab:hover{transform:scale(1.08)}
.apanel{position:fixed;top:0;right:0;bottom:0;width:min(400px,100vw);background:var(--bg);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .3s;overflow-y:auto;padding:24px;overscroll-behavior:contain}.apanel.open{transform:translateX(0)}
.aov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;pointer-events:none;transition:opacity .25s}.aov.open{opacity:1;pointer-events:auto}
.acl{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}.acl:hover{background:var(--bg3);color:var(--text)}
.atit{font-size:19px;font-weight:600;margin-bottom:20px}
.asec{margin-bottom:22px}.ast{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px}
.abig{text-align:center;padding:20px;background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border)}.abn{font-size:46px;font-weight:700;font-family:var(--mono);color:var(--accent);line-height:1}.abl{font-size:12px;color:var(--text3);margin-top:4px}
.apr{display:flex;align-items:center;gap:8px;margin-bottom:9px}.apnm{font-size:12.5px;color:var(--text2);min-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.apbw{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}.apbf{height:100%;border-radius:4px;transition:width .4s}
.app{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:32px;text-align:right}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.agi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}.agn{font-size:24px;font-weight:600;font-family:var(--mono);line-height:1.1}.agl{font-size:10.5px;color:var(--text3);margin-top:3px}
.pbr{display:flex;flex-direction:column;gap:6px}.pb{display:flex;align-items:center;gap:7px;font-size:12.5px}.pbd{width:8px;height:8px;border-radius:50%;flex-shrink:0}.pbl{color:var(--text2);flex:1}.pbv{font-family:var(--mono);font-size:11px;color:var(--text3)}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:600;margin-bottom:16px}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.modal input[type=text],.modal input[type=url]{width:100%;padding:8px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;outline:none;margin-bottom:12px}
.modal input:focus{border-color:var(--accent)}
.modal .mbtn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid var(--border);transition:all .15s}
.modal .mbtn-p{color:#000;background:var(--accent);border-color:var(--accent)}.modal .mbtn-p:hover{background:var(--accent2)}
.modal .mbtn-s{color:var(--text2);background:var(--bg3)}.modal .mbtn-s:hover{color:var(--text)}
.modal .mrow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.modal .minfo{font-size:11.5px;color:var(--text3);margin-bottom:12px;line-height:1.5}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}.empty .em{font-size:36px;margin-bottom:8px}
.resetw{text-align:center;margin-top:32px;padding-top:18px;border-top:1px solid var(--border)}
.resetb{padding:8px 20px;border-radius:8px;font-size:12px;font-weight:500;color:var(--critical);background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.15);cursor:pointer;font-family:var(--font)}.resetb:hover{background:rgba(255,71,87,.12)}
.imp-label{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;color:var(--text2);background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-family:var(--font);display:inline-block}.imp-label:hover{color:var(--text)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.card{animation:fadeUp .25s ease both}
@keyframes flash{0%{opacity:0;transform:scale(.9)}40%{opacity:1}100%{opacity:0;transform:scale(1.05)}}
.pcf{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none}.pcf .msg{font-size:24px;font-weight:700;color:var(--low);animation:flash 1.6s ease forwards}
@media(max-width:480px){:root{--hh:56px;--th:46px}html{font-size:18px}.hdr{padding:0 14px;gap:6px}.lt span{display:none}.pill.hm{display:none}.main{padding:18px 18px 110px}.ptitle{font-size:20px}.tab{padding:7px 12px;font-size:12px}.card{padding:14px 16px}.apanel{width:100vw;padding:20px}.apnm{min-width:80px;font-size:11.5px}.si{font-size:14px;padding:8px 14px}.fb{padding:6px 13px;font-size:12px}.modal{padding:20px}}
@media(min-width:481px)and(max-width:768px){.main{padding:20px 24px 120px}.pill.hm{display:none}}
@media(min-width:1200px){.main{max-width:940px}}@media(min-width:1600px){.main{max-width:1020px}.card{padding:18px 22px}}
</style>
</head>
<body>
<header class="hdr">
<div class="logo"><div class="li">AI</div><div class="lt">Roadmap <span>2026</span></div></div>
<div class="hs">
<div class="pill hm"><span class="n" id="sd">0</span>/<span id="st">0</span></div>
<button class="hbtn" id="gear" title="Settings">⚙</button>
<div class="rw" id="rclick" title="Analytics"><svg class="rsvg" viewBox="0 0 36 36"><circle class="rbg" cx="18" cy="18" r="15"/><circle class="rfill" id="rf" cx="18" cy="18" r="15" stroke-dasharray="94.25" stroke-dashoffset="94.25"/></svg><div class="rtxt" id="rt">0%</div></div>
</div>
</header>
<nav class="tw"><div class="tabs" id="tabs"></div></nav>
<main class="main"><div id="phdr"></div><div class="fbar" id="fbar"></div><div id="recs"></div><div id="il"></div>
<div class="resetw" id="rw"><button class="resetb" id="rb">Reset all progress</button></div></main>
<button class="afab" id="afab">📊</button>
<div class="aov" id="aov"></div>
<aside class="apanel" id="apn"><button class="acl" id="acl">✕</button><div class="atit">Progress analytics</div><div id="ac"></div></aside>
<div class="modal-ov" id="mov"><div class="modal" id="modal"></div></div>
<input type="file" id="imp-file" accept=".json" style="display:none">
<script>
// ═══════════════════════════════════════
// DATA — phases and items with deps

{id:'f2',t:'3Blue1Brown: Neural Networks',d:'Visual intuitions for neural nets, gradient descent, backprop, and transformers/attention.',r:[{n:'▶️ Neural Net Playlist',u:'https://www.youtube.com/playlist?list=PLZHQObOWTQDNU6R1_67000Dx_ZCJB-3pi',t:'video'},{n:'▶️ Attention in Transformers',u:'https://www.youtube.com/watch?v=eMlx5fFNoYc',t:'video'}],tags:['visual intuition','gradient descent','backprop','attention','transformers'],p:'critical'},

{id:'f4',t:'Stanford CS229: Machine Learning',d:'Andrew Ng\'s ML course. Regression, SVMs, neural nets, unsupervised learning, math rigor.',r:[{n:'▶️ CS229 Lectures',u:'https://www.youtube.com/playlist?list=PLoROMvodv4rMiGQp3WXShtMGgzqpfVfbU',t:'video'},{n:'Course Notes',u:'https://cs229.stanford.edu/main_notes.pdf',t:'docs'}],tags:['ML fundamentals','regression','SVMs','math foundations'],p:'medium'},

const SK='ai-roadmap-v5';
let S={ck:{},ip:{},notes:{},ap:'foundations',fl:'all',q:'',recs:[],custom:{},wurl:'',model:'claude-sonnet-4-20250514'};
const load=()=>{try{const d=JSON.parse(localStorage.getItem(SK));if(d)Object.assign(S,d)}catch(e){}};
const save=()=>{try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}};
const $=id=>document.getElementById(id);

// helpers
const allI=()=>{
  const items=[];
  P.forEach(p=>{
    const customs=(S.custom[p.id]||[]);
    items.push(...p.items,...customs);
  });
  return items;
};
const phaseItems=pid=>{const ph=P.find(p=>p.id===pid);return ph?[...ph.items,...(S.custom[pid]||[])]:[]};
const itemSt=id=>S.ck[id]?'done':S.ip[id]?'ip':'';
const ps=pid=>{const items=phaseItems(pid);const d=items.filter(i=>S.ck[i.id]).length;return{d,t:items.length,p:items.length?Math.round(d/items.length*100):0}};
const os=()=>{const a=allI(),d=a.filter(i=>S.ck[i.id]).length,cr=a.filter(i=>i.p==='critical'),cd=cr.filter(i=>S.ck[i.id]).length;return{d,t:a.length,p:a.length?Math.round(d/a.length*100):0,cd,ct:cr.length}};
const ri=t=>({docs:'📄',blog:'📝',video:'▶️',book:'📕',paper:'🔬',course:'🎓',code:'💻'}[t]||'🔗');
const findItem=id=>allI().find(i=>i.id===id);
let expandedId=null;

if(S.fl!=='all')items=items.filter(i=>i.p===S.fl);
if(S.q){const q=S.q.toLowerCase();items=items.filter(i=>i.t.toLowerCase().includes(q)||i.d.toLowerCase().includes(q)||i.tags.some(t=>t.toLowerCase().includes(q)))}
$('il').innerHTML=items.length?items.map(i=>cardHTML(i,customIds.has(i.id))).join(''):'<div class="empty"><div class="em">🔍</div><p>No items match</p></div>';

$('il').querySelectorAll('.stbtn').forEach(b=>b.onclick=e=>{

  save();renderTabs();renderPhdr();renderHeader();renderItems();

$('il').querySelectorAll('[data-exp]').forEach(b=>b.onclick=e=>{

$('il').querySelectorAll('.notes-area').forEach(ta=>{ta.oninput=e=>{S.notes[ta.dataset.note]=ta.value;save()}});

$('il').querySelectorAll('[data-delc]').forEach(b=>b.onclick=e=>{

async function scanLandscape(){
const btn=$('scanbtn');if(!btn)return;
btn.disabled=true;btn.textContent='🔍 Scanning with '+S.model.split('-').slice(0,2).join('-')+'…';
const existing=allI().map(i=>i.t).join(', ');
const prompt=`You are an AI engineering landscape researcher. Search X (Twitter), AI engineering blogs, Hacker News, and GitHub for the latest notable developments in AI/ML engineering from the past 2-3 weeks.

Focus on: new tools/frameworks gaining traction, new model releases, training/inference breakthroughs, notable open-source repos (by people like Karpathy, Andrej, etc.), paradigm shifts, emerging best practices.

These topics are ALREADY in my roadmap — do NOT suggest duplicates: ${existing}

Return ONLY a JSON array (no markdown, no backticks) of 3-5 suggestions:
[{"title":"...","description":"...","tags":["..."],"priority":"critical|high|medium|low","phase":"best matching phase id from: ${P.map(p=>p.id).join(',')}","resources":[{"name":"...","url":"...","type":"video|docs|blog|code"}],"worth_it":true/false,"reasoning":"1 sentence on why this is/isn't worth adding"}]`;
try{
const res=await fetch(S.wurl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
model:S.model,max_tokens:4000,
tools:[{type:'web_search_20250305',name:'web_search'}],
messages:[{role:'user',content:prompt}]
})});
const data=await res.json();
if(data.error){alert('API error: '+data.error);btn.disabled=false;btn.textContent='🔍 Scan landscape';return}
// Worker returns normalized {text, provider, ...}
const text=data.text||data.content?.map(b=>b.text||'').join('')||'';
// Clean response: strip markdown fences, find outermost JSON array
let clean=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
// Greedy match: outermost [ ... ] (last closing bracket)
const start=clean.indexOf('[');const end=clean.lastIndexOf(']');
if(start!==-1&&end>start){
try{S.recs=JSON.parse(clean.slice(start,end+1));save();renderRecs()}
catch(pe){alert('JSON parse error: '+pe.message+'\n\nRaw (first 500 chars):\n'+clean.slice(start,start+500))}
}else{alert('No JSON array found in response.\n\nRaw:\n'+text.slice(0,400))}
}catch(e){alert('Scan failed: '+e.message)}
btn.disabled=false;btn.textContent='🔍 Scan landscape';
}

const closeA=()=>{$('apn').classList.remove('open');$('aov').classList.remove('open')};

load();render();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
