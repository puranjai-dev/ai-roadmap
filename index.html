<title>AI Engineer Roadmap 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#131319;--bg3:#1b1b24;--bg4:#242430;
--border:#2a2a38;--border2:#3a3a4a;
--text:#e8e8ed;--text2:#9898aa;--text3:#666680;
--accent:#f5a623;--accent2:#d4900e;--accent-glow:rgba(245,166,35,.1);
--critical:#ff4757;--high:#ff8c42;--medium:#ffd166;--low:#06d6a0;
--radius:10px;--radius-lg:14px;
--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
--header-h:60px;--tabs-h:50px;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;line-height:1.5}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
a{color:var(--accent);text-decoration:none;transition:color .15s}
a:hover{color:#ffc56e}

.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:rgba(10,10,15,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 20px;gap:14px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#e07a08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#000;letter-spacing:-.5px}
.logo-text{font-weight:600;font-size:16px;letter-spacing:-.3px;white-space:nowrap}
.logo-text span{color:var(--text3);font-weight:400;font-size:13px;margin-left:3px}
.header-stats{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0}
.stat-pill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);background:var(--bg2);padding:5px 11px;border-radius:20px;border:1px solid var(--border);white-space:nowrap}
.stat-pill .n{font-family:var(--mono);font-weight:500;color:var(--accent);font-size:12px}
.ring-wrap{position:relative;width:34px;height:34px;flex-shrink:0;cursor:pointer}
.ring-wrap:hover{transform:scale(1.05)}
.ring{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:3}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;font-family:var(--mono);color:var(--accent)}

.tabs-wrap{position:fixed;top:var(--header-h);left:0;right:0;height:var(--tabs-h);background:rgba(10,10,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:99;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;align-items:center;height:100%;padding:0 16px;gap:3px;min-width:max-content}
.tab{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid transparent;display:flex;align-items:center;gap:7px;user-select:none}
.tab:hover{color:var(--text2);background:var(--bg2)}
.tab.active{color:var(--text);background:var(--bg3);border-color:var(--border)}
.tab-badge{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3);line-height:1.3}
.tab.active .tab-badge{background:var(--accent-glow);color:var(--accent)}
.tab.done .tab-badge{background:rgba(6,214,160,.12);color:var(--low)}
.tab-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.main{margin-top:calc(var(--header-h) + var(--tabs-h));padding:20px 16px 120px;max-width:880px;margin-left:auto;margin-right:auto}

.phase-header{margin-bottom:20px}
.phase-title{font-size:22px;font-weight:600;letter-spacing:-.4px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.phase-sub{color:var(--text3);font-size:13px;margin-bottom:14px}
.phase-bar-wrap{display:flex;align-items:center;gap:10px}
.bar-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease;background:var(--accent)}
.bar-fill.done{background:var(--low)}
.bar-pct{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:36px;text-align:right}

.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:16px;font-size:11.5px;font-weight:500;color:var(--text3);background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s;font-family:var(--font);user-select:none}
.fbtn:hover{border-color:var(--border2);color:var(--text2)}
.fbtn.on{color:var(--text);border-color:var(--accent);background:var(--accent-glow)}
.sinput{flex:1;min-width:140px;padding:6px 12px;border-radius:16px;font-size:12px;color:var(--text);background:var(--bg2);border:1px solid var(--border);font-family:var(--font);outline:none;transition:border-color .15s}
.sinput::placeholder{color:var(--text3)}
.sinput:focus{border-color:var(--accent)}

.item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px;transition:all .2s;position:relative}
.item:hover{border-color:var(--border2);background:var(--bg3)}
.item.chk{opacity:.5}
.item.chk:hover{opacity:.7}
.item.chk .ititle{text-decoration:line-through;text-decoration-color:var(--text3)}
.itop{display:flex;align-items:flex-start;gap:11px}
.cbw{flex-shrink:0;margin-top:1px}
.cb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border:2px solid var(--border2);border-radius:5px;cursor:pointer;transition:all .15s;display:block;background:transparent}
.cb:hover{border-color:var(--accent)}
.cb:checked{background:var(--accent);border-color:var(--accent)}
.cb:checked::after{content:'✓';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;height:100%}
.ic{flex:1;min-width:0}
.itr{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px}
.ititle{font-size:14px;font-weight:500;line-height:1.3}
.pbadge{font-size:9px;font-weight:600;font-family:var(--mono);padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.pbadge.critical{background:rgba(255,71,87,.12);color:var(--critical)}
.pbadge.high{background:rgba(255,140,66,.12);color:var(--high)}
.pbadge.medium{background:rgba(255,209,102,.12);color:var(--medium)}
.pbadge.low{background:rgba(6,214,160,.12);color:var(--low)}
.idesc{font-size:12.5px;color:var(--text2);margin-bottom:8px;line-height:1.45}
.ires{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.rchip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500;background:var(--bg4);color:var(--text2);border:1px solid transparent;transition:all .15s;text-decoration:none}
.rchip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.rchip .ri{font-size:11px;opacity:.7}
.itags{display:flex;flex-wrap:wrap;gap:3px}
.ttag{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:3px;color:var(--text3);background:rgba(255,255,255,.03)}

.afab{position:fixed;bottom:20px;right:20px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e07a08);color:#000;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(245,166,35,.25);z-index:100;transition:transform .15s}
.afab:hover{transform:scale(1.08)}
.apanel{position:fixed;top:0;right:0;bottom:0;width:min(380px,100vw);background:var(--bg);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:20px;overscroll-behavior:contain}
.apanel.open{transform:translateX(0)}
.aover{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;pointer-events:none;transition:opacity .25s}
.aover.open{opacity:1;pointer-events:auto}
.aclose{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.aclose:hover{background:var(--bg3);color:var(--text)}
.atitle{font-size:18px;font-weight:600;margin-bottom:18px;letter-spacing:-.2px}
.asec{margin-bottom:20px}
.asec-t{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px}
.abig{text-align:center;padding:18px;background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border)}
.abig-n{font-size:44px;font-weight:700;font-family:var(--mono);color:var(--accent);line-height:1}
.abig-l{font-size:12px;color:var(--text3);margin-top:3px}
.apr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.apr-name{font-size:12px;color:var(--text2);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.apr-bw{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.apr-bf{height:100%;border-radius:4px;transition:width .4s}
.apr-p{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:32px;text-align:right}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.agrid-i{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.agrid-n{font-size:22px;font-weight:600;font-family:var(--mono);line-height:1.1}
.agrid-l{font-size:10px;color:var(--text3);margin-top:2px}
.pbr{display:flex;flex-direction:column;gap:5px}
.pb{display:flex;align-items:center;gap:7px;font-size:12px}
.pbd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pbl{color:var(--text2);flex:1}
.pbv{font-family:var(--mono);font-size:11px;color:var(--text3)}

.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty .em{font-size:36px;margin-bottom:8px}
.empty p{font-size:13px}

.resetw{text-align:center;margin-top:32px;padding-top:18px;border-top:1px solid var(--border)}
.resetb{padding:7px 18px;border-radius:8px;font-size:11px;font-weight:500;color:var(--critical);background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.15);cursor:pointer;font-family:var(--font);transition:all .15s}
.resetb:hover{background:rgba(255,71,87,.12);border-color:rgba(255,71,87,.3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.item{animation:fadeUp .25s ease both}
.item:nth-child(2){animation-delay:.02s}.item:nth-child(3){animation-delay:.04s}.item:nth-child(4){animation-delay:.06s}.item:nth-child(5){animation-delay:.08s}.item:nth-child(6){animation-delay:.1s}.item:nth-child(7){animation-delay:.12s}.item:nth-child(8){animation-delay:.14s}.item:nth-child(9){animation-delay:.16s}.item:nth-child(10){animation-delay:.18s}

@keyframes flash{0%{opacity:0;transform:scale(.9)}40%{opacity:1;transform:scale(1.02)}100%{opacity:0;transform:scale(1.05)}}
.pcflash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none}
.pcflash .msg{font-size:24px;font-weight:700;color:var(--low);animation:flash 1.6s ease forwards;text-align:center;padding:20px;text-shadow:0 0 40px rgba(6,214,160,.3)}

@media(max-width:640px){
  .header{padding:0 12px;gap:8px}
  .logo-text span{display:none}
  .stat-pill.hm{display:none}
  .main{padding:14px 10px 100px}
  .phase-title{font-size:19px}
  .item{padding:12px}
  .tab{padding:6px 10px;font-size:11.5px}
  .apanel{width:100vw;padding:16px}
  .apr-name{min-width:70px;font-size:11px}
  .ititle{font-size:13px}
  .idesc{font-size:11.5px}
}
@media(min-width:1200px){.main{max-width:940px}}
@media(min-width:1600px){.main{max-width:1020px}.item{padding:16px 20px}}
</style>
</head>

const SK='ai-roadmap-v2';
let S={ck:{},ap:'foundations',fl:'all',q:''};
const load=()=>{try{const d=JSON.parse(localStorage.getItem(SK));if(d){S.ck=d.ck||{};S.ap=d.ap||'foundations'}}catch(e){}};
const save=()=>{try{localStorage.setItem(SK,JSON.stringify({ck:S.ck,ap:S.ap}))}catch(e){}};
const allItems=()=>P.flatMap(p=>p.items);
const ps=p=>{const d=p.items.filter(i=>S.ck[i.id]).length;return{d,t:p.items.length,p:p.items.length?Math.round(d/p.items.length*100):0}};
const os=()=>{const a=allItems(),d=a.filter(i=>S.ck[i.id]).length,cr=a.filter(i=>i.p==='critical'),cd=cr.filter(i=>S.ck[i.id]).length;return{d,t:a.length,p:a.length?Math.round(d/a.length*100):0,cd,ct:cr.length}};
const ri=t=>({docs:'📄',blog:'📝',video:'▶️',book:'📕',paper:'🔬',course:'🎓',code:'💻'}[t]||'🔗');

function renderTabs(){
const el=$('tabs');
el.innerHTML=P.map(p=>{const s=ps(p);return`<div class="tab${p.id===S.ap?' active':''}${s.p===100?' done':''}" data-p="${p.id}"><span class="tab-dot" style="background:${p.c}"></span>${p.t.replace(/Phase \d+: /,'').replace('Skippable: ','⏭ ')}<span class="tab-badge">${s.d}/${s.t}</span></div>`}).join('');
el.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{S.ap=t.dataset.p;save();render();t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})});
}

function renderMain(){
const ph=P.find(p=>p.id===S.ap);if(!ph)return;
const s=ps(ph);
let items=ph.items;
if(S.fl!=='all')items=items.filter(i=>i.p===S.fl);
if(S.q){const q=S.q.toLowerCase();items=items.filter(i=>i.t.toLowerCase().includes(q)||i.d.toLowerCase().includes(q)||i.tags.some(t=>t.toLowerCase().includes(q)))}
const m=$('main');
m.innerHTML=`<div class="phase-header">
<div class="phase-title"><span style="color:${ph.c}">●</span> ${ph.t}</div>
<div class="phase-sub">${ph.s}</div>
<div class="phase-bar-wrap"><div class="bar-track"><div class="bar-fill${s.p===100?' done':''}" style="width:${s.p}%"></div></div><div class="bar-pct">${s.p}%</div></div>
</div>
<div class="filter-bar">
${['all','critical','high','medium','low'].map(f=>`<button class="fbtn${S.fl===f?' on':''}" data-f="${f}">${f==='all'?'All':f[0].toUpperCase()+f.slice(1)}</button>`).join('')}
<input class="sinput" type="text" placeholder="Search topics…" value="${S.q}">
</div>
<div id="il">${items.length?items.map(i=>`<div class="item${S.ck[i.id]?' chk':''}">
<div class="itop"><div class="cbw"><input class="cb" type="checkbox"${S.ck[i.id]?' checked':''} data-id="${i.id}"></div>
<div class="ic"><div class="itr"><span class="ititle">${i.t}</span><span class="pbadge ${i.p}">${i.p}</span></div>
<div class="idesc">${i.d}</div>
<div class="ires">${i.r.map(r=>`<a class="rchip" href="${r.u}" target="_blank" rel="noopener"><span class="ri">${ri(r.t)}</span>${r.n}</a>`).join('')}</div>
<div class="itags">${i.tags.map(t=>`<span class="ttag">${t}</span>`).join('')}</div></div></div></div>`).join(''):'<div class="empty"><div class="em">🔍</div><p>No items match your filters</p></div>'}</div>
<div class="resetw"><button class="resetb" id="rb">Reset all progress</button></div>`;
m.querySelectorAll('.cb').forEach(cb=>cb.onchange=e=>{const id=e.target.dataset.id;if(e.target.checked)S.ck[id]=1;else delete S.ck[id];save();render();const ns=ps(ph);if(ns.p===100&&e.target.checked)showFlash(ph.t)});
m.querySelectorAll('.fbtn').forEach(b=>b.onclick=()=>{S.fl=b.dataset.f;render()});
const si=m.querySelector('.sinput');si.oninput=e=>{S.q=e.target.value;renderMain()};
$('rb').onclick=()=>{if(confirm('Reset all progress? This cannot be undone.')){S.ck={};save();render()}};
}

function renderHeader(){
const s=os();
$('sd').textContent=s.d;$('st').textContent=s.t;$('sc').textContent=s.cd+'/'+s.ct;
const c=94.25,o=c-(c*s.p/100);
$('rf').style.strokeDashoffset=o;$('rt').textContent=s.p+'%';
}

function renderAnalytics(){
const o=os(),a=allItems(),bp={critical:0,high:0,medium:0,low:0},bt={critical:0,high:0,medium:0,low:0};
a.forEach(i=>{bt[i.p]++;if(S.ck[i.id])bp[i.p]++});
$('ac').innerHTML=`<div class="asec"><div class="abig"><div class="abig-n">${o.p}%</div><div class="abig-l">Overall · ${o.d} of ${o.t} items</div></div></div>
<div class="asec"><div class="asec-t">Priority breakdown</div><div class="pbr">
${[['critical','--critical'],['high','--high'],['medium','--medium'],['low','--low']].map(([k,v])=>`<div class="pb"><span class="pbd" style="background:var(${v})"></span><span class="pbl">${k}</span><span class="pbv">${bp[k]}/${bt[k]}</span></div>`).join('')}
</div></div>
<div class="asec"><div class="asec-t">Phase progress</div>
${P.map(p=>{const s=ps(p);return`<div class="apr"><span class="apr-name" title="${p.t}">${p.t.replace(/Phase \d+: /,'').replace('Skippable: ','')}</span><div class="apr-bw"><div class="apr-bf" style="width:${s.p}%;background:${p.c}"></div></div><span class="apr-p">${s.p}%</span></div>`}).join('')}
</div>
<div class="asec"><div class="asec-t">Quick stats</div><div class="agrid">
<div class="agrid-i"><div class="agrid-n" style="color:var(--critical)">${bp.critical}/${bt.critical}</div><div class="agrid-l">Critical done</div></div>
<div class="agrid-i"><div class="agrid-n" style="color:var(--low)">${P.filter(p=>ps(p).p===100).length}/${P.length}</div><div class="agrid-l">Phases done</div></div>
<div class="agrid-i"><div class="agrid-n" style="color:var(--accent)">${a.filter(i=>S.ck[i.id]).reduce((s,i)=>s+i.r.length,0)}</div><div class="agrid-l">Resources used</div></div>
<div class="agrid-i"><div class="agrid-n" style="color:var(--text)">${o.t-o.d}</div><div class="agrid-l">Remaining</div></div>
</div></div>`;
}

function showFlash(t){const el=document.createElement('div');el.className='pcflash';el.innerHTML=`<div class="msg">✅ ${t} complete!</div>`;document.body.appendChild(el);setTimeout(()=>el.remove(),1800)}
const $=id=>document.getElementById(id);
function render(){renderTabs();renderMain();renderHeader();renderAnalytics()}

// Analytics panel
const openA=()=>{$('apn').classList.add('open');$('aov').classList.add('open');renderAnalytics()};
const closeA=()=>{$('apn').classList.remove('open');$('aov').classList.remove('open')};
$('afab').onclick=openA;$('aov').onclick=closeA;$('acl').onclick=closeA;$('ring-click').onclick=openA;
document.onkeydown=e=>{if(e.key==='Escape')closeA()};

load();render();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
